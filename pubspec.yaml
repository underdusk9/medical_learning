name: medical_workbuddy
description: 西医综合考研刷题应用
publish_to: 'none'
version: 1.5.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  sqflite: ^2.3.0
  path: ^1.9.0
  shared_preferences: ^2.2.0
  file_picker: ^8.0.0
  intl: ^0.19.0
  http: ^1.2.0
  url_launcher: ^6.2.0
  open_filex: ^4.5.0
  path_provider: ^2.1.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/A_vibrant_and_modern_medical_e_2026-06-21T14-29-11.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/questions/
    - assets/questions/source/
    - assets/images/
